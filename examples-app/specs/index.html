<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Specs · Stenc</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="/">Stenc</a>
        <nav aria-label="Document collections"><a class="nav-link" href="/specs/">Specs</a><a class="nav-link" href="/plans/">Plans</a><a class="nav-link" href="/decisions/">Decisions</a><a class="nav-link" href="/agent-context/">Agent Context</a></nav>
      </aside>
      <main><header class="document-header"><div class="kicker">Stenc</div><h1>Specs</h1><p class="description">Fixed-format documents rendered from structured JSON.</p></header><div class="sorting-controls">
      <span class="sorting-label">Sort by:</span>
      <button class="sort-btn active" data-sort="updated" data-order="desc">Last Updated</button>
      <button class="sort-btn" data-sort="created" data-order="desc">Date Created</button>
      <button class="sort-btn" data-sort="title" data-order="asc">Title</button>
    </div><section class="grid"><a class="panel" href="/specs/artifact-identity/" data-title="Rail Artifact Identity Contract" data-updated="2026-05-19" data-created="2026-05-19"><h3>Rail Artifact Identity Contract</h3><p>Example single-document Stenc spec for Rail artifact identity and projection authority.</p><div class="meta"><span class="badge status-draft">draft</span><span class="badge">Owner: rail-runtime</span><span class="badge date-badge">Updated: 2026-05-19</span></div></a></section><script>
      document.addEventListener('DOMContentLoaded', () => {
        const grid = document.querySelector('.grid');
        if (!grid) return;
        const cards = Array.from(grid.querySelectorAll('.panel[data-updated]'));
        const buttons = document.querySelectorAll('.sort-btn');
        
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const sortBy = btn.getAttribute('data-sort');
            const order = btn.getAttribute('data-order');
            
            cards.sort((a, b) => {
              const valA = a.getAttribute('data-' + sortBy) || '';
              const valB = b.getAttribute('data-' + sortBy) || '';
              
              const cmp = valA.localeCompare(valB);
              return order === 'desc' ? -cmp : cmp;
            });
            
            cards.forEach(card => grid.appendChild(card));
          });
        });
      });
    </script></main>
    </div>
  </body>
</html>
